[project]
name = "kage"
version = "0.1.0"
description = "Local-first personal context broker — your notes, surfaced into your cloud AI, on your machine."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12",
]

[project.scripts]
kage = "kage.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kage"]
